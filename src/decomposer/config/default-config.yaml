# 匹配配置 (Matching Configuration)
matching:
  # 最小置信度阈值
  minConfidence: 0.3

  # 多类型组合策略: "weighted" | "max" | "average"
  combinationStrategy: "weighted"

  # 能力权重调整
  capabilityWeights:
    reasoning: 1.2
    security: 1.1
    code: 1.0
    logic: 1.0
    api: 0.9
    ui: 0.9
    test: 0.9
    style: 0.8
    database: 0.9
    long_context: 1.0
    multi_modal: 1.0

  # 相似度计算方法: "cosine" | "dot" | "euclidean"
  similarityMethod: "weighted"

  # 回退模型选择策略
  fallbackStrategy: "capability"

# ==================== LLM 配置 ====================
llm:
  enabled: true
  base_url: "http://localhost:11434"
  model: "qwen2.5:3b"
  timeout: 60000

# ==================== 混合语义分析配置 ====================
# 启用混合模式（结合算法和LLM）
hybrid_semantic:
  enabled: true
  # 是否启用LLM增强（设为true才会调用LLM）
  llm_enabled: true
  # 触发LLM的相似度阈值（低于此值才触发LLM增强）
  llm_threshold: 0.3
  # 最多LLM调用次数（防止无限调用）
  max_llm_calls: 10
  # 启用缓存避免重复调用
  cache_enabled: true
