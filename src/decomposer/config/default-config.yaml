# 多标签任务类型与模型能力匹配配置
# Multi-label Task Type and Model Capability Matching Configuration

# 任务类型定义 (Task Type Definitions)
taskTypes:
  ui:
    label: "用户界面"
    description: "用户界面开发，包括组件、页面、样式等"
    keywords: ["ui", "component", "button", "input", "form", "modal", "page", "view", "界面", "组件", "按钮", "表单"]
    regexPatterns:
      - "\\.(tsx|jsx|vue|svelte)$"
      - "component|Component"
      - "styled?\\.|css\\.|scss\\.|less"
    weight: 0.9

  api:
    label: "API接口"
    description: "API接口开发，包括REST、GraphQL等"
    keywords: ["api", "endpoint", "route", "request", "response", "rest", "graphql", "http", "接口", "路由"]
    regexPatterns:
      - "router\\.|Route\\.|@router"
      - "GET|POST|PUT|DELETE|PATCH"
      - "/api/.*"
    weight: 0.9

  logic:
    label: "业务逻辑"
    description: "业务逻辑处理，算法实现等"
    keywords: ["logic", "business", "algorithm", "process", "service", "manager", "业务", "逻辑", "算法", "处理"]
    regexPatterns:
      - "service|Service|manager|Manager"
      - "process|Process"
    weight: 0.85

  model:
    label: "数据模型"
    description: "数据模型定义，ORM映射等"
    keywords: ["model", "entity", "schema", "type", "interface", "class", "数据模型", "实体", "类型"]
    regexPatterns:
      - "model|Entity|Schema"
      - "interface\\s+\\w+"
      - "type\\s+\\w+"
    weight: 0.85

  test:
    label: "测试"
    description: "测试代码编写"
    keywords: ["test", "spec", "mock", "suite", "expect", "assert", "测试", "单元测试", "集成测试"]
    regexPatterns:
      - "\\.(test|spec)\\.(js|ts|tsx)$"
      - "describe|it\\(|test\\("
    weight: 0.8

  style:
    label: "样式"
    description: "样式编写，包括CSS、SCSS等"
    keywords: ["style", "css", "scss", "less", "theme", "responsive", "样式", "主题"]
    regexPatterns:
      - "\\.(css|scss|less|sass)$"
      - "style|styleName|className"
    weight: 0.8

  config:
    label: "配置"
    description: "配置文件"
    keywords: ["config", "setting", "options", "environment", "配置", "设置", "环境变量"]
    regexPatterns:
      - "(config|\\.env|settings|options)\\.(js|ts|json|yaml|yml)$"
    weight: 0.7

  form:
    label: "表单处理"
    description: "表单处理，包括表单验证、提交等"
    keywords: ["form", "input", "validation", "submit", "field", "表单", "验证", "输入"]
    regexPatterns:
      - "Form|form|Input|input"
      - "validation|validate"
    weight: 0.75

  auth:
    label: "认证授权"
    description: "认证和授权相关功能"
    keywords: ["auth", "login", "logout", "session", "token", "jwt", "permission", "认证", "登录", "权限"]
    regexPatterns:
      - "auth|Auth|login|Login"
      - "jwt|token|Token"
      - "permission|Permission"
    weight: 0.8

  database:
    label: "数据库"
    description: "数据库操作相关"
    keywords: ["database", "db", "query", "sql", "mongodb", "mysql", "postgres", "数据库", "查询"]
    regexPatterns:
      - "database|db|Database"
      - "SELECT|INSERT|UPDATE|DELETE"
    weight: 0.85

  state:
    label: "状态管理"
    description: "状态管理相关功能"
    keywords: ["state", "store", "redux", "context", "reactive", "状态", "存储", "Redux"]
    regexPatterns:
      - "store|Store|state|State"
      - "redux|Redux|context|Context"
    weight: 0.8

  i18n:
    label: "国际化"
    description: "国际化相关功能"
    keywords: ["i18n", "locale", "translation", "language", "international", "国际化", "翻译", "语言"]
    regexPatterns:
      - "i18n|locale|Locale"
      - "translation|translate"
    weight: 0.7

  security:
    label: "安全相关"
    description: "安全相关功能"
    keywords: ["security", "secure", "encrypt", "decrypt", "hash", "crypto", "安全", "加密", "解密"]
    regexPatterns:
      - "security|Security|encrypt|Encrypt"
      - "crypto|Crypto|hash|Hash"
    weight: 0.85

  performance:
    label: "性能优化"
    description: "性能优化相关"
    keywords: ["performance", "optimize", "cache", "lazy", "memo", "性能", "优化", "缓存"]
    regexPatterns:
      - "performance|Performance|optimize|Optimize"
      - "cache|Cache|memo|Memo"
    weight: 0.75

  devops:
    label: "部署运维"
    description: "部署和运维相关"
    keywords: ["devops", "deploy", "docker", "k8s", "kubernetes", "ci", "cd", "部署", "Docker", "K8s"]
    regexPatterns:
      - "Dockerfile|docker-compose"
      - "\\.yml$|\\.yaml$"
    weight: 0.7

  docs:
    label: "文档"
    description: "文档编写"
    keywords: ["docs", "documentation", "readme", "comment", "文档", "说明"]
    regexPatterns:
      - "README|readme"
      - "docs/|documentation/"
    weight: 0.6

