# 提供商 API 端点配置
# 定义各提供商的 API 端点和模型 ID 映射

# API 端点配置
endpoints:
  # 阿里云 Coding Plan
  aliyun: "https://coding.dashscope.aliyuncs.com/v1"
  minimax: "https://coding.dashscope.aliyuncs.com/v1"  # 使用相同的 Coding Plan 端点
  moonshot: "https://coding.dashscope.aliyuncs.com/v1"  # 使用相同的 Coding Plan 端点
  zhipu: "https://coding.dashscope.aliyuncs.com/v1"     # 使用相同的 Coding Plan 端点

  # 独立提供商
  openai: "https://api.openai.com/v1"
  anthropic: "https://api.anthropic.com/v1"
  gemini: "https://generativelanguage.googleapis.com/v1beta"
  deepseek: "https://api.deepseek.com/v1"
  ollama: "http://localhost:11434/api"

# API 密钥配置（环境变量映射）
apiKeys:
  aliyun: "DASHSCOPE_API_KEY"
  minimax: "DASHSCOPE_API_KEY"
  moonshot: "DASHSCOPE_API_KEY"
  zhipu: "DASHSCOPE_API_KEY"
  openai: "OPENAI_API_KEY"
  anthropic: "ANTHROPIC_API_KEY"
  gemini: "GEMINI_API_KEY"
  google: "GOOGLE_API_KEY"
  deepseek: "DEEPSEEK_API_KEY"

# 模型 ID 映射（模型 ID -> API 中使用的实际模型 ID）
# 注意：配置文件中的 id 字段是服务商当前支持的模型名称，不需要额外映射
# 因此 modelMappings 应该为空，或者只包含确实需要映射的模型
modelMappings: {}
